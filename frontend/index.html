<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreador de Portfólio - Criptomoedas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1"><i class="bi bi-wallet2 me-2"></i>Crypto Portfolio</span>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 text-secondary">Meus Aportes Registrados</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalAporte">
                <i class="bi bi-plus-circle me-2"></i>Novo Aporte
            </button>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-3">ID</th>
                                <th>Ativo</th>
                                <th>Sigla</th>
                                <th>Quantidade</th>
                                <th>Valor Investido</th>
                                <th>Data do Aporte</th>
                                <th class="text-end pe-3">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-ativos">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAporte" tabindex="-1" aria-labelledby="modalAporteLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-secondary" id="modalAporteLabel">Registrar Novo Aporte</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="form-aporte">
                        <div class="mb-3">
                            <label for="nome_moeda" class="form-label">Criptomoeda</label>
                            <input type="text" class="form-control" id="nome_moeda" placeholder="Ex: Bitcoin" required>
                        </div>
                        <div class="mb-3">
                            <label for="sigla" class="form-label">Sigla</label>
                            <input type="text" class="form-control" id="sigla" placeholder="Ex: BTC" required>
                        </div>
                        <div class="mb-3">
                            <label for="quantidade" class="form-label">Quantidade</label>
                            <input type="number" step="any" class="form-control" id="quantidade" placeholder="Ex: 0.015"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="valor_investido" class="form-label">Valor Investido (R$)</label>
                            <input type="number" step="any" class="form-control" id="valor_investido"
                                placeholder="Ex: 5000.00" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarAporte()">Salvar Aporte</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/app.js"></script>
</body>

</html>
